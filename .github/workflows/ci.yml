name: Docs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  phantom-endpoints:
    name: Docs /v1 endpoint check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Checkout arche_api
        uses: actions/checkout@v4
        with:
          repository: ProtosSystems/arche_api
          ref: main
          token: ${{ secrets.ARCHEREPO_READ_TOKEN != '' && secrets.ARCHEREPO_READ_TOKEN || github.token }}
          path: arche_api

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install arche_api dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r arche_api/requirements.txt

      - name: Validate docs endpoints
        run: |
          python3 scripts/check_phantom_endpoints.py \
            --docs-root src/app/docs \
            --arche-api-root arche_api
